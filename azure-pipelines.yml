trigger:
  - main
  - release/*

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      git remote add github https://github.com/navpan02/NP02.git
      git push github --all --force
      git push github --tags --force
    displayName: Mirror to GitHub