<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 40px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
    }

    .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.35);
    }

    .logo svg { width: 26px; height: 26px; fill: #fff; }

    h1 {
      color: #fff;
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 0.875rem;
      text-align: center;
      margin-top: 6px;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      stroke: rgba(255,255,255,0.35);
      stroke-width: 2;
      fill: none;
      pointer-events: none;
      flex-shrink: 0;
      transition: stroke 0.2s;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 13px 44px 13px 42px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.25); }

    input:focus {
      border-color: #e94560;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.18);
    }

    input:focus + .status-icon ~ svg,
    .input-wrap:focus-within > svg { stroke: rgba(233, 69, 96, 0.8); }

    /* toggle password button */
    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,0.7); }
    .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

    /* validation state */
    .field.valid input   { border-color: #22c55e; }
    .field.invalid input { border-color: #ef4444; }

    .hint {
      font-size: 0.75rem;
      margin-top: 6px;
      min-height: 18px;
      transition: color 0.2s;
      color: rgba(255,255,255,0.35);
    }
    .field.invalid .hint { color: #f87171; }
    .field.valid   .hint { color: #4ade80; }

    /* password strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-bar span {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: rgba(255,255,255,0.1);
      transition: background 0.3s;
    }
    .strength-bar.s1 span:nth-child(1)              { background: #ef4444; }
    .strength-bar.s2 span:nth-child(-n+2)           { background: #f97316; }
    .strength-bar.s3 span:nth-child(-n+3)           { background: #eab308; }
    .strength-bar.s4 span                           { background: #22c55e; }

    .strength-label {
      font-size: 0.7rem;
      margin-top: 4px;
      color: rgba(255,255,255,0.4);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
    }

    button[type="submit"]:hover  { opacity: 0.9; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .toast {
      display: none;
      margin-top: 20px;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      text-align: center;
      animation: slideIn 0.3s ease;
    }
    .toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.35); color: #4ade80; }
    .toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.35);  color: #f87171; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; border-radius: 20px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account</p>

  <form id="loginForm" novalidate>

    <!-- Username -->
    <div class="field" id="emailField">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="username"
          required
        />
      </div>
      <p class="hint" id="emailHint"></p>
    </div>

    <!-- Password -->
    <div class="field" id="passwordField">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Min 8 chars, A-Z, 0-9, symbol"
          autocomplete="current-password"
          required
        />
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar" id="strengthBar">
        <span></span><span></span><span></span><span></span>
      </div>
      <p class="strength-label" id="strengthLabel"></p>
      <p class="hint" id="passwordHint"></p>
    </div>

    <button type="submit" id="submitBtn">Sign in</button>
    <div class="toast" id="toast"></div>
  </form>
</div>

<script>
  const VALID_EMAIL    = 'navpan@gmail.com';
  const VALID_PASSWORD = 'H3lloW0rld$';

  const emailInput    = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailField    = document.getElementById('emailField');
  const passwordField = document.getElementById('passwordField');
  const emailHint     = document.getElementById('emailHint');
  const passwordHint  = document.getElementById('passwordHint');
  const strengthBar   = document.getElementById('strengthBar');
  const strengthLabel = document.getElementById('strengthLabel');
  const togglePw      = document.getElementById('togglePw');
  const eyeIcon       = document.getElementById('eyeIcon');
  const form          = document.getElementById('loginForm');
  const toast         = document.getElementById('toast');

  /* ── helpers ── */
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function validateEmail(val) {
    if (!val) return { ok: false, msg: 'Email is required.' };
    if (!EMAIL_RE.test(val)) return { ok: false, msg: 'Enter a valid email address.' };
    return { ok: true, msg: '✓ Looks good!' };
  }

  function scorePassword(val) {
    let score = 0;
    const checks = {
      length:  val.length >= 8,
      upper:   /[A-Z]/.test(val),
      number:  /[0-9]/.test(val),
      special: /[^A-Za-z0-9]/.test(val),
    };
    score = Object.values(checks).filter(Boolean).length;
    return { score, checks };
  }

  function validatePassword(val) {
    if (!val) return { ok: false, msg: 'Password is required.' };
    const { checks } = scorePassword(val);
    const missing = [];
    if (!checks.length)  missing.push('at least 8 characters');
    if (!checks.upper)   missing.push('1 uppercase letter');
    if (!checks.number)  missing.push('1 number');
    if (!checks.special) missing.push('1 special character');
    if (missing.length)  return { ok: false, msg: 'Needs ' + missing.join(', ') + '.' };
    return { ok: true, msg: '✓ Strong password!' };
  }

  const STRENGTH_MAP = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const STRENGTH_CLASS = ['', 's1', 's2', 's3', 's4'];

  function updateStrength(val) {
    if (!val) {
      strengthBar.className = 'strength-bar';
      strengthLabel.textContent = '';
      return;
    }
    const { score } = scorePassword(val);
    strengthBar.className = 'strength-bar ' + STRENGTH_CLASS[score];
    strengthLabel.textContent = score ? STRENGTH_MAP[score] : '';
  }

  function setFieldState(field, hint, result) {
    field.classList.toggle('valid',   result.ok);
    field.classList.toggle('invalid', !result.ok);
    hint.textContent = result.msg;
  }

  /* ── live validation ── */
  emailInput.addEventListener('input', () => {
    setFieldState(emailField, emailHint, validateEmail(emailInput.value.trim()));
  });

  passwordInput.addEventListener('input', () => {
    updateStrength(passwordInput.value);
    setFieldState(passwordField, passwordHint, validatePassword(passwordInput.value));
  });

  /* ── toggle password visibility ── */
  togglePw.addEventListener('click', () => {
    const isText = passwordInput.type === 'text';
    passwordInput.type = isText ? 'password' : 'text';
    eyeIcon.innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  });

  /* ── form submit ── */
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    toast.style.display = 'block';
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const emailVal = emailInput.value.trim();
    const passVal  = passwordInput.value;

    const eResult = validateEmail(emailVal);
    const pResult = validatePassword(passVal);

    setFieldState(emailField,    emailHint,    eResult);
    setFieldState(passwordField, passwordHint, pResult);

    if (!eResult.ok || !pResult.ok) return;

    if (emailVal !== VALID_EMAIL || passVal !== VALID_PASSWORD) {
      showToast('Invalid email or password. Please try again.', 'error');
      return;
    }

    showToast('Login successful! Redirecting…', 'success');
    form.querySelectorAll('input, button').forEach(el => el.disabled = true);
  });
</script>
</body>
</html>
