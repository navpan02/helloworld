name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
      - 'claude/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nplawn-react/package-lock.json

      - name: Install dependencies
        working-directory: nplawn-react
        run: npm ci

      - name: Build
        working-directory: nplawn-react
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: nplawn-react/dist
          force_orphan: true
