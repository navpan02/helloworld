trigger:
  - main
  - release/*
  - claude/*
  - feature*
  - gh-pages

pool:
  name: 'Default'

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      git remote add github https://github.com/navpan02/NP02.git || git remote set-url github https://github.com/navpan02/NP02.git
      
      # Fetch all branches from ADO
      git fetch origin '+refs/heads/*:refs/remotes/origin/*'
      
      # Push all branches and tags to GitHub
      git push github '+refs/remotes/origin/*:refs/heads/*' --force
      git push github --tags --force
    displayName: 'Mirror to GitHub'